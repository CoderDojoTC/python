# Site configuration
edit_uri: 'blob/master/docs'
theme:
  name: material
  logo: img/python-logo.jpeg
  palette:
    primary: '#642580'
    accent: '#41BAC1'
  feature:
    tabs: true
  custom_dir: 'theme'
  include_sidebar: true
markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true
plugins:
    - search
extra_css:
  - css/skulpt.css
  - css/mascot.css
extra_javascript:
  - js/skulpt.js
# Google Analytics Site ID: G-EP38Z3PVD5
extra:
  analytics:
    provider: google
    # https://analytics.google.com/analytics/web/#/p368752593/reports/intelligenthome
    property: G-EP38Z3PVD5

